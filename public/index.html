<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K21 Calorie Tracker</title>
<style>
  :root {
    --green: #2f9e6e;
    --green-light: #e6f6ee;
    --orange: #f0924a;
    --orange-light: #fdece0;
    --ink: #223026;
    --muted: #6b7d73;
    --bg: #f7faf8;
    --card: #ffffff;
    --border: #e3ece6;
    --radius: 16px;
    --shadow: 0 4px 16px rgba(34, 48, 38, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px 16px 64px;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  header.app-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 4px;
    padding: 4px 4px 0;
  }

  header.app-header h1 {
    font-size: 1.6rem;
    margin: 0;
    background: linear-gradient(90deg, var(--green), var(--orange));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  header.app-header .today-date {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 22px;
  }

  .card h2 {
    margin: 0 0 14px;
    font-size: 1.05rem;
    color: var(--ink);
  }

  /* Daily summary */
  .summary-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .summary-calories {
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1;
  }

  .summary-calories span {
    font-size: 1rem;
    font-weight: 400;
    color: var(--muted);
  }

  .goal-edit {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .goal-edit input {
    width: 80px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 0.9rem;
  }

  .goal-edit button {
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    background: var(--green-light);
    color: var(--green);
    font-weight: 600;
    cursor: pointer;
    font-size: 0.85rem;
  }

  .progress-track {
    margin-top: 16px;
    height: 14px;
    border-radius: 999px;
    background: var(--green-light);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--green), var(--orange));
    transition: width 0.3s ease;
  }

  .progress-caption {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  /* Add meal form */
  #meal-form {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 600;
  }

  .field input,
  .field select {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 0.95rem;
    background: #fff;
    color: var(--ink);
  }

  .field input:focus,
  .field select:focus {
    outline: 2px solid var(--green);
    outline-offset: 1px;
  }

  #meal-form button {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, var(--green), var(--orange));
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.95rem;
    white-space: nowrap;
  }

  #meal-form button:hover { filter: brightness(1.05); }

  /* Meals list */
  .meal-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .meal-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
  }

  .meal-info {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .meal-name {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .meal-type-badge {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 3px 8px;
    border-radius: 999px;
    flex-shrink: 0;
  }

  .meal-type-breakfast { background: var(--orange-light); color: var(--orange); }
  .meal-type-lunch { background: var(--green-light); color: var(--green); }
  .meal-type-dinner { background: #e7ecfa; color: #4a5fc1; }
  .meal-type-snack { background: #f5e9fa; color: #9b4fc4; }

  .meal-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .meal-cal {
    font-weight: 700;
    color: var(--ink);
    font-size: 0.95rem;
  }

  .delete-btn {
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
  }

  .delete-btn:hover {
    color: #c0392b;
    background: #fdecea;
  }

  .empty-state {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 16px 0;
  }

  /* Weekly chart */
  .chart {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
    height: 160px;
    padding-top: 10px;
  }

  .chart-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    gap: 6px;
  }

  .chart-bar-track {
    width: 100%;
    max-width: 34px;
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--green-light);
    border-radius: 6px 6px 2px 2px;
    overflow: hidden;
  }

  .chart-bar {
    width: 100%;
    border-radius: 6px 6px 2px 2px;
    background: linear-gradient(180deg, var(--orange), var(--green));
    min-height: 2px;
    transition: height 0.3s ease;
  }

  .chart-bar.is-today {
    background: linear-gradient(180deg, var(--green), var(--green));
    box-shadow: 0 0 0 2px var(--green-light);
  }

  .chart-value {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 600;
  }

  .chart-label {
    font-size: 0.75rem;
    color: var(--muted);
  }

  @media (max-width: 520px) {
    #meal-form {
      grid-template-columns: 1fr 1fr;
    }
    #meal-form button {
      grid-column: 1 / -1;
    }
    .summary-calories {
      font-size: 2rem;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>K21 Calorie Tracker</h1>
      <div class="today-date" id="today-date"></div>
    </header>

    <section class="card" id="summary-card">
      <h2>Daily Summary</h2>
      <div class="summary-top">
        <div class="summary-calories">
          <span id="calories-consumed">0</span>
          <span>/ <span id="calories-goal">2000</span> kcal</span>
        </div>
        <div class="goal-edit">
          <label for="goal-input">Goal</label>
          <input type="number" id="goal-input" min="500" step="50" value="2000">
          <button type="button" id="save-goal-btn">Save</button>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <div class="progress-caption" id="progress-caption">0% of today's goal</div>
    </section>

    <section class="card">
      <h2>Add Meal</h2>
      <form id="meal-form">
        <div class="field">
          <label for="meal-name">Meal name</label>
          <input type="text" id="meal-name" placeholder="e.g. Grilled chicken salad" required>
        </div>
        <div class="field">
          <label for="meal-calories">Calories</label>
          <input type="number" id="meal-calories" min="1" step="1" placeholder="kcal" required>
        </div>
        <div class="field">
          <label for="meal-type">Type</label>
          <select id="meal-type">
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="snack">Snack</option>
          </select>
        </div>
        <button type="submit">Add</button>
      </form>
    </section>

    <section class="card">
      <h2>Today's Meals</h2>
      <ul class="meal-list" id="meal-list"></ul>
      <div class="empty-state" id="empty-state">No meals logged yet today. Add your first meal above.</div>
    </section>

    <section class="card">
      <h2>Weekly History</h2>
      <div class="chart" id="chart"></div>
    </section>
  </div>

<script>
  const STORAGE_MEALS = 'k21_meals';
  const STORAGE_GOAL = 'k21_goal';
  const DEFAULT_GOAL = 2000;

  const els = {
    todayDate: document.getElementById('today-date'),
    caloriesConsumed: document.getElementById('calories-consumed'),
    caloriesGoal: document.getElementById('calories-goal'),
    goalInput: document.getElementById('goal-input'),
    saveGoalBtn: document.getElementById('save-goal-btn'),
    progressFill: document.getElementById('progress-fill'),
    progressCaption: document.getElementById('progress-caption'),
    mealForm: document.getElementById('meal-form'),
    mealName: document.getElementById('meal-name'),
    mealCalories: document.getElementById('meal-calories'),
    mealType: document.getElementById('meal-type'),
    mealList: document.getElementById('meal-list'),
    emptyState: document.getElementById('empty-state'),
    chart: document.getElementById('chart'),
  };

  function loadMeals() {
    try {
      const raw = localStorage.getItem(STORAGE_MEALS);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function saveMeals(meals) {
    localStorage.setItem(STORAGE_MEALS, JSON.stringify(meals));
  }

  function loadGoal() {
    const raw = localStorage.getItem(STORAGE_GOAL);
    const parsed = raw ? parseInt(raw, 10) : DEFAULT_GOAL;
    return Number.isFinite(parsed) && parsed > 0 ? parsed : DEFAULT_GOAL;
  }

  function saveGoal(goal) {
    localStorage.setItem(STORAGE_GOAL, String(goal));
  }

  function dateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function formatDisplayDate(date) {
    return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  let meals = loadMeals();
  let goal = loadGoal();

  function renderHeader() {
    els.todayDate.textContent = formatDisplayDate(new Date());
  }

  function renderSummary() {
    const todayKey = dateKey(new Date());
    const todayMeals = meals.filter(m => m.date === todayKey);
    const consumed = todayMeals.reduce((sum, m) => sum + m.calories, 0);
    const pct = Math.min(100, Math.round((consumed / goal) * 100));

    els.caloriesConsumed.textContent = consumed;
    els.caloriesGoal.textContent = goal;
    els.goalInput.value = goal;
    els.progressFill.style.width = `${pct}%`;

    if (consumed > goal) {
      els.progressCaption.textContent = `${pct}% of today's goal — ${consumed - goal} kcal over`;
      els.progressFill.style.background = '#e08a3f';
    } else {
      els.progressCaption.textContent = `${pct}% of today's goal`;
      els.progressFill.style.background = '';
    }
  }

  function renderMealList() {
    const todayKey = dateKey(new Date());
    const todayMeals = meals
      .filter(m => m.date === todayKey)
      .sort((a, b) => b.createdAt - a.createdAt);

    els.mealList.innerHTML = '';
    els.emptyState.style.display = todayMeals.length ? 'none' : 'block';

    for (const meal of todayMeals) {
      const li = document.createElement('li');
      li.className = 'meal-item';
      li.innerHTML = `
        <div class="meal-info">
          <span class="meal-type-badge meal-type-${meal.type}">${meal.type}</span>
          <span class="meal-name">${escapeHtml(meal.name)}</span>
        </div>
        <div class="meal-right">
          <span class="meal-cal">${meal.calories} kcal</span>
          <button class="delete-btn" data-id="${meal.id}" title="Delete meal">&times;</button>
        </div>
      `;
      els.mealList.appendChild(li);
    }
  }

  function renderChart() {
    els.chart.innerHTML = '';
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      days.push(d);
    }

    const totals = days.map(d => {
      const key = dateKey(d);
      return meals
        .filter(m => m.date === key)
        .reduce((sum, m) => sum + m.calories, 0);
    });

    // Scale against the tallest day actually logged, not the goal — otherwise
    // bars are invisibly short whenever daily totals sit far below goal.
    const max = Math.max(...totals, 1);
    const todayKey = dateKey(new Date());

    days.forEach((d, i) => {
      const key = dateKey(d);
      const total = totals[i];
      const heightPct = Math.max(2, Math.round((total / max) * 100));

      const col = document.createElement('div');
      col.className = 'chart-col';
      col.innerHTML = `
        <span class="chart-value">${total || ''}</span>
        <div class="chart-bar-track">
          <div class="chart-bar${key === todayKey ? ' is-today' : ''}" style="height: ${heightPct}%"></div>
        </div>
        <span class="chart-label">${d.toLocaleDateString('en-GB', { weekday: 'short' })}</span>
      `;
      els.chart.appendChild(col);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderAll() {
    renderHeader();
    renderSummary();
    renderMealList();
    renderChart();
  }

  els.mealForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = els.mealName.value.trim();
    const calories = parseInt(els.mealCalories.value, 10);
    const type = els.mealType.value;

    if (!name || !Number.isFinite(calories) || calories <= 0) return;

    meals.push({
      id: crypto.randomUUID(),
      name,
      calories,
      type,
      date: dateKey(new Date()),
      createdAt: Date.now(),
    });

    saveMeals(meals);
    els.mealForm.reset();
    els.mealName.focus();
    renderAll();
  });

  els.mealList.addEventListener('click', (e) => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    meals = meals.filter(m => m.id !== id);
    saveMeals(meals);
    renderAll();
  });

  els.saveGoalBtn.addEventListener('click', () => {
    const value = parseInt(els.goalInput.value, 10);
    if (!Number.isFinite(value) || value <= 0) return;
    goal = value;
    saveGoal(goal);
    renderAll();
  });

  renderAll();
</script>
</body>
</html>
